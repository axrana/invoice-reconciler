name: Build Offline EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger it manually

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pandas openpyxl pdfplumber pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile reconcile.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Invoice_Reconciler_EXE
        path: dist/reconcile.exe
